# Implement workflow — execute verified slices of work

id: implement
description: Execute implementation one vertical slice at a time
next: workflow/verify.yaml

steps:
  - id: slice_scope
    kind: deliberative
    description: |
      Break the task into vertical slices. Each slice should:
      - Touch all layers (DB → service → API → frontend where applicable)
      - Be independently testable
      - Produce a working increment
      Propose the slice order. Back and forth until consensus.

  - id: execute_slice
    kind: deliberative
    description: |
      Implement the current slice. After each edit:
      - Verify the change works (test, compile, lint)
      - Save checkpoint
      Show the diff and ask: "Ready for next slice?"
      Loop until all slices are done.

  - id: final_verify
    kind: deterministic
    script: scripts/workflow/final-verify.sh
    description: Run full test suite, type check, linter on all changed files
