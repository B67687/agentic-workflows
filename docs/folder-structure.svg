<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" width="100%" height="100%" style="max-width:720px; font-family:ui-monospace,'Cascadia Code','Fira Code',monospace;">
  <defs>
    <filter id="nodeGlow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#58a6ff" flood-opacity="0.15"/>
    </filter>
