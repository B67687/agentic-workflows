  <!-- swarmvault.schema.md -->
  <rect x="250" y="235" width="190" height="34" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="270" y="256" fill="#8b949e" font-size="20" text-anchor="start">🗃️</text>
  <text x="295" y="258" fill="#8b949e" font-size="11" font-weight="bold" text-anchor="start">swarmvault.schema.md</text>

