  <line x1="140" y1="130" x2="580" y2="130" stroke="#30363d" stroke-width="1"/>

  <!-- Branch to AGENTS.md (y=130) -->
  <line x1="360" y1="130" x2="140" y2="130" stroke="#30363d" stroke-width="1"/>

