  <line x1="120" y1="40" x2="600" y2="40" stroke="#58a6ff" stroke-width="1" opacity="0.2"/>

  <!-- Root node -->
  <rect x="260" y="55" width="200" height="36" rx="6" fill="#1a1a2e" stroke="#58a6ff" stroke-width="1.5" filter="url(#nodeGlow)"/>
  <text x="360" y="72" fill="#58a6ff" font-size="12" font-weight="bold" text-anchor="middle">agentic-workflows/</text>
  <line x1="360" y1="91" x2="360" y2="110" stroke="#30363d" stroke-width="1.5"/>

  <!-- Tree trunk -->
  <line x1="360" y1="110" x2="360" y2="395" stroke="#30363d" stroke-width="1.5"/>

  <!-- Horizontal branches -->
