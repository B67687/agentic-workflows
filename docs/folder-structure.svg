  <rect x="590" y="195" width="110" height="34" rx="5" fill="#16213e" stroke="#3fb950" stroke-width="1"/>
  <text x="605" y="216" fill="#58a6ff" font-size="20" text-anchor="start">📖</text>
  <text x="628" y="218" fill="#3fb950" font-size="11" font-weight="bold" text-anchor="start">wiki/</text>
