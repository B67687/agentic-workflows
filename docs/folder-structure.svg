  <text x="80" y="137" fill="#58a6ff" font-size="20" text-anchor="start">📄</text>
  <text x="110" y="132" fill="#58a6ff" font-size="12" font-weight="bold" text-anchor="start">AGENTS.md</text>
  <text x="110" y="146" fill="#8b949e" font-size="10" text-anchor="start">Operating contract</text>

  <!-- commands/ -->
  <rect x="250" y="155" width="100" height="34" rx="5" fill="#16213e" stroke="#0ea5e9" stroke-width="1"/>
  <text x="265" y="174" fill="#58a6ff" font-size="20" text-anchor="start">⚡</text>
  <text x="288" y="176" fill="#0ea5e9" font-size="11" font-weight="bold" text-anchor="start">commands/</text>
