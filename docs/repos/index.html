<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repository Traffic Overview</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📊</text></svg>">
  <style>
    :root {
      --bg: #0d1117; --card: #161b22; --border: #30363d;
      --text: #e6edf3; --text2: #8b949e; --blue: #58a6ff;
      --green: #3fb950; --orange: #d29922; --purple: #bc8cff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; padding: 2rem; }
    h1 { margin-bottom: .25rem; }
    .subtitle { color: var(--text2); margin-bottom: 2rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; }
    .card h2 { font-size: 1.1rem; margin-bottom: .75rem; }
    .card h2 a { color: var(--blue); text-decoration: none; }
    .card h2 a:hover { text-decoration: underline; }
    .stat { display: flex; justify-content: space-between; padding: .3rem 0; border-bottom: 1px solid var(--border); font-size: .9rem; }
    .stat:last-child { border-bottom: none; }
    .stat .label { color: var(--text2); }
    .stat .value { font-weight: 600; }
    .val-blue { color: var(--blue); }
    .val-green { color: var(--green); }
    .val-orange { color: var(--orange); }
    .val-purple { color: var(--purple); }
    .loading { color: var(--text2); font-style: italic; font-size: .85rem; }
    .updated { color: var(--text2); font-size: .75rem; margin-top: .5rem; text-align: right; }
    .footer { margin-top: 2rem; color: var(--text2); font-size: .85rem; text-align: center; }
    .footer a { color: var(--blue); }
    .error { color: #f85149; font-size: .85rem; }
  </style>
</head>
<body>
  <h1>📊 Repository Traffic</h1>
  <p class="subtitle">All B67687 repos — clones, views, and releases</p>
  <div class="grid" id="grid"></div>
  <div class="footer">
    <a href="https://github.com/B67687/agentic-workflows">agentic-workflows</a> ·
    Data refreshes daily at 3am UTC ·
    <a href="stats/">Agentic Workflows Dashboard</a>
  </div>

  <script>
const REPOS = [
  { name: "agentic-workflows", gist: "fed5bb761c0f8fa03776d33187d49435", desc: "Agent harness hub" },
  { name: "BusHop-SG",         gist: "4845d76fc7e704afce78c827650bd0ce", desc: "Singapore bus timing" },
  { name: "ScenicFetch",       gist: "41c4142c68a816251f3466ba57db0967", desc: "Wallpaper fetcher" },
  { name: "MathLearningNotes", gist: "432884d28bd91aefb9574eb105f57629", desc: "Math study notes" },
  { name: "PythonLearningNotes", gist: "3681a13789d9a7551c0998945dd5804e", desc: "Python study notes" },
  { name: "H2-Computing",      gist: "317f06538a932f7500de35291c6fe756", desc: "A-Level Computing notes" },
  { name: "CS50p-2022",        gist: "341d02627e895660ef55727d5473e01d", desc: "CS50 Python solutions" },
  { name: "Password-Generator", gist: "343b148a4ffd56d1af061f36b2f63f2b", desc: "Password generator" },
];

const grid = document.getElementById("grid");

for (const repo of REPOS) {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <h2><a href="https://github.com/B67687/${repo.name}" target="_blank">${repo.name}</a></h2>
    <div class="desc" style="color:var(--text2);font-size:.85rem;margin-bottom:.75rem;">${repo.desc}</div>
    <div class="loading" id="load-${repo.name}">Loading...</div>
    <div id="data-${repo.name}" style="display:none"></div>
    <div class="updated" id="updated-${repo.name}"></div>
  `;
  grid.appendChild(card);

  // Fetch state.json from gist
  fetch(`https://gist.githubusercontent.com/B67687/${repo.gist}/raw/state.json`)
    .then(r => {
      if (!r.ok) throw new Error("Not found");
      return r.json();
    })
    .then(state => {
      document.getElementById(`load-${repo.name}`).style.display = "none";
      const dataDiv = document.getElementById(`data-${repo.name}`);
      dataDiv.style.display = "block";

      const organic = state.totalOrganicClones ?? state.totalClones ?? 0;
      const views = state.totalViews ?? 0;
      const downloads = state.totalDownloads ?? 0;
      const unique = state.totalUniqueClones ?? 0;
      const uniqueViews = state.totalUniqueViews ?? 0;
      const stars = state.stars ?? 0;
      const forks = state.forks ?? 0;
      const ci = state.totalCiCheckouts ?? 0;
      const lastEntry = (state.dailyHistory || []).slice(-1)[0];
      const lastDate = lastEntry ? new Date(lastEntry.date).toLocaleDateString() : "—";
      const capturedAt = lastEntry?.capturedAt ? new Date(lastEntry.capturedAt).toLocaleString() : "—";

      dataDiv.innerHTML = `
        <div class="stat"><span class="label">Clones (organic)</span><span class="value val-blue">${organic.toLocaleString()}</span></div>
        <div class="stat"><span class="label">Unique cloners</span><span class="value val-purple">${unique.toLocaleString()}</span></div>
        <div class="stat"><span class="label">Views</span><span class="value val-green">${views.toLocaleString()}</span></div>
        <div class="stat"><span class="label">Unique viewers</span><span class="value val-orange">${uniqueViews.toLocaleString()}</span></div>
        <div class="stat"><span class="label">Release downloads</span><span class="value">${downloads.toLocaleString()}</span></div>
        <div class="stat"><span class="label">CI checkouts (subtracted)</span><span class="value">${ci}</span></div>
        <div class="stat"><span class="label">★ Stars</span><span class="value">${stars}</span></div>
        <div class="stat"><span class="label">⑂ Forks</span><span class="value">${forks}</span></div>
        <div style="margin-top:.5rem">
          <a href="https://gist.github.com/B67687/${repo.gist}" target="_blank" style="font-size:.8rem">View raw data →</a>
        </div>
      `;
      document.getElementById(`updated-${repo.name}`).textContent = `Last data: ${capturedAt}`;
    })
    .catch(err => {
      document.getElementById(`load-${repo.name}`).textContent = "No data yet (workflow runs at 3am UTC)";
      document.getElementById(`load-${repo.name}`).className = "error";
    });
}
  </script>
</body>
</html>
