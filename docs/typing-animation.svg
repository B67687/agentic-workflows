      @keyframes ph { 0%,100% { opacity: 0.07; } 35% { opacity: 0.55; } 70% { opacity: 0.12; } }
      .ph { animation: ph 1.2s ease-in-out infinite; }
      @keyframes fade1 {
        0%   { opacity: 0; }
        12%  { opacity: 0; }
        16%  { opacity: 1; }
        75%  { opacity: 1; }
        85%  { opacity: 0; }
        100% { opacity: 0; }
      }
      .fade1 { animation: fade1 14s ease-in-out infinite; }
      @keyframes fade2 {
        0%   { opacity: 0; }
        28%  { opacity: 0; }
        32%  { opacity: 1; }
        75%  { opacity: 1; }
        85%  { opacity: 0; }
