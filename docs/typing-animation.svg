        56% { opacity: 0.02; }
        77% { opacity: 0.85; transform: scale(2.0);  fill: #58a6ff; }
        80% { opacity: 0.02; }
      }
      .pa, .pb, .pc, .pd, .pe, .pf, .pg, .ph { transform-box: fill-box; transform-origin: center; animation-duration: 8s; animation-timing-function: ease-in-out; animation-iteration-count: infinite; }
      .pa { animation-name: pa; } .pb { animation-name: pb; } .pc { animation-name: pc; } .pd { animation-name: pd; }
      .pe { animation-name: pe; } .pf { animation-name: pf; } .pg { animation-name: pg; } .ph { animation-name: ph; }
      .fade1 { animation: fade1 14s ease-in-out infinite; }
      .fade2 { animation: fade2 14s ease-in-out infinite; }
      .fade3 { animation: fade3 14s ease-in-out infinite; }
      .fade4 { animation: fade4 14s ease-in-out infinite; }
      @keyframes fade1 { 0%{opacity:0}12%{opacity:0}16%{opacity:1}75%{opacity:1}85%{opacity:0}100%{opacity:0} }
      @keyframes fade2 { 0%{opacity:0}28%{opacity:0}32%{opacity:1}75%{opacity:1}85%{opacity:0}100%{opacity:0} }
      @keyframes fade3 { 0%{opacity:0}44%{opacity:0}48%{opacity:1}75%{opacity:1}85%{opacity:0}100%{opacity:0} }
      @keyframes fade4 { 0%{opacity:0}60%{opacity:0}64%{opacity:1}75%{opacity:1}85%{opacity:0}100%{opacity:0} }
      .text-layer { filter: drop-shadow(0 0 4px rgba(88,166,255,0.3)); }
    </style>
