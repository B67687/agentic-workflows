<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 115" style="background:transparent; font-family:ui-monospace,'Cascadia Code','Fira Code',monospace;">
  <defs>
    <style>
      /* All dots same speed (8s cycle). Each class has different PULSE COUNT (frequency).
         pa=1 pulse, pb=2, pc=3, pd=4, pe=5, pf=6, pg=7, ph=8 pulses per 8s.
         Each pulse has unique colour+size. Random delay → independent timing. */
      @keyframes pa { 0%,97%,100%{opacity:0.01;fill:#58a6ff} 5%{opacity:0.85;transform:scale(2.0);fill:#3fb950} 8%{opacity:0.03} }
      @keyframes pb {
        0%,97%,100%{opacity:0.01;fill:#58a6ff}
        5%{opacity:0.8;transform:scale(1.8);fill:#d29922}8%{opacity:0.03}
        49%{opacity:0.7;transform:scale(1.3);fill:#bc8cff}52%{opacity:0.02}
      }
      @keyframes pc {
        0%,97%,100%{opacity:0.01;fill:#58a6ff}
        5%{opacity:0.85;transform:scale(2.0);fill:#f778ba}8%{opacity:0.03}
        35%{opacity:0.6;transform:scale(1.2);fill:#3fb950}38%{opacity:0.02}
        65%{opacity:0.7;transform:scale(1.5);fill:#d29922}68%{opacity:0.03}
      }
      @keyframes pd {
        0%,97%,100%{opacity:0.01;fill:#58a6ff}
        5%{opacity:0.8;transform:scale(1.7);fill:#bc8cff}8%{opacity:0.03}
        27%{opacity:0.7;transform:scale(1.4);fill:#d29922}30%{opacity:0.02}
        49%{opacity:0.85;transform:scale(2.0);fill:#f778ba}52%{opacity:0.03}
        71%{opacity:0.6;transform:scale(1.2);fill:#3fb950}74%{opacity:0.02}
      }
      @keyframes pe {
        0%,97%,100%{opacity:0.01;fill:#58a6ff}
        5%{opacity:0.85;transform:scale(2.0);fill:#3fb950}8%{opacity:0.03}
        23%{opacity:0.6;transform:scale(1.1);fill:#f778ba}26%{opacity:0.02}
        41%{opacity:0.7;transform:scale(1.6);fill:#58a6ff}44%{opacity:0.03}
        59%{opacity:0.5;transform:scale(0.9);fill:#bc8cff}62%{opacity:0.02}
        77%{opacity:0.75;transform:scale(1.5);fill:#d29922}80%{opacity:0.03}
      }
      @keyframes pf {
        0%,97%,100%{opacity:0.01;fill:#58a6ff}
        5%{opacity:0.8;transform:scale(1.7);fill:#d29922}8%{opacity:0.03}
        21%{opacity:0.6;transform:scale(1.2);fill:#bc8cff}24%{opacity:0.02}
        37%{opacity:0.85;transform:scale(2.0);fill:#3fb950}40%{opacity:0.03}
        53%{opacity:0.5;transform:scale(0.8);fill:#f778ba}56%{opacity:0.02}
        69%{opacity:0.7;transform:scale(1.4);fill:#58a6ff}72%{opacity:0.03}
        85%{opacity:0.6;transform:scale(1.1);fill:#bc8cff}88%{opacity:0.02}
      }
      @keyframes pg {
        0%,97%,100%{opacity:0.01;fill:#58a6ff}
        5%{opacity:0.85;transform:scale(2.0);fill:#f778ba}8%{opacity:0.03}
        18%{opacity:0.5;transform:scale(0.9);fill:#3fb950}21%{opacity:0.02}
        31%{opacity:0.7;transform:scale(1.5);fill:#d29922}34%{opacity:0.03}
        44%{opacity:0.6;transform:scale(1.2);fill:#58a6ff}47%{opacity:0.02}
        57%{opacity:0.8;transform:scale(1.7);fill:#bc8cff}60%{opacity:0.03}
        70%{opacity:0.5;transform:scale(0.8);fill:#f778ba}73%{opacity:0.02}
        83%{opacity:0.7;transform:scale(1.4);fill:#3fb950}86%{opacity:0.03}
      }
      @keyframes ph {
        0%,97%,100%{opacity:0.01;fill:#58a6ff}
        5%{opacity:0.8;transform:scale(1.6);fill:#bc8cff}8%{opacity:0.03}
        16%{opacity:0.6;transform:scale(1.1);fill:#d29922}19%{opacity:0.02}
        27%{opacity:0.7;transform:scale(1.4);fill:#3fb950}30%{opacity:0.03}
        38%{opacity:0.85;transform:scale(2.0);fill:#f778ba}41%{opacity:0.02}
        49%{opacity:0.5;transform:scale(0.9);fill:#58a6ff}52%{opacity:0.03}
        60%{opacity:0.7;transform:scale(1.5);fill:#bc8cff}63%{opacity:0.02}
        71%{opacity:0.6;transform:scale(1.2);fill:#d29922}74%{opacity:0.03}
        82%{opacity:0.75;transform:scale(1.5);fill:#3fb950}85%{opacity:0.02}
      }
      .pa, .pb, .pc, .pd, .pe, .pf, .pg, .ph { transform-box: fill-box; transform-origin: center; animation-duration: 8s; animation-timing-function: ease-in-out; animation-iteration-count: infinite; }
      .pa { animation-name: pa; } .pb { animation-name: pb; } .pc { animation-name: pc; } .pd { animation-name: pd; }
      .pe { animation-name: pe; } .pf { animation-name: pf; } .pg { animation-name: pg; } .ph { animation-name: ph; }
      .fade1 { animation: fade1 14s ease-in-out infinite; }
      .fade2 { animation: fade2 14s ease-in-out infinite; }
      .fade3 { animation: fade3 14s ease-in-out infinite; }
      .fade4 { animation: fade4 14s ease-in-out infinite; }
      @keyframes fade1 { 0%{opacity:0}12%{opacity:0}16%{opacity:1}75%{opacity:1}85%{opacity:0}100%{opacity:0} }
      @keyframes fade2 { 0%{opacity:0}28%{opacity:0}32%{opacity:1}75%{opacity:1}85%{opacity:0}100%{opacity:0} }
      @keyframes fade3 { 0%{opacity:0}44%{opacity:0}48%{opacity:1}75%{opacity:1}85%{opacity:0}100%{opacity:0} }
      @keyframes fade4 { 0%{opacity:0}60%{opacity:0}64%{opacity:1}75%{opacity:1}85%{opacity:0}100%{opacity:0} }
      .text-layer { filter: drop-shadow(0 0 4px rgba(88,166,255,0.3)); }
    </style>
  </defs>
