      @keyframes pulseG { 0%,100% { opacity: 0.074; } 35% { opacity: 0.562; } 70% { opacity: 0.075; } }
      .pulseg { animation: pulseG 3.7s ease-in-out infinite; }
      @keyframes pulseH { 0%,100% { opacity: 0.03; } 35% { opacity: 0.649; } 70% { opacity: 0.054; } }
      .pulseh { animation: pulseH 1.34s ease-in-out infinite; }

      @keyframes fade1 {
        0%   { opacity: 0; transform: translateY(6px); }
        0%  { opacity: 0; }
        4%  { opacity: 1; transform: translateY(0); }
        75%  { opacity: 1; }
        85%  { opacity: 0; transform: translateY(-4px); }
        100% { opacity: 0; }
      }
      .fade1 { animation: fade1 14s ease-in-out infinite; }
      @keyframes fade2 {
        0%   { opacity: 0; transform: translateY(6px); }
        14%  { opacity: 0; }
        18%  { opacity: 1; transform: translateY(0); }
        75%  { opacity: 1; }
        85%  { opacity: 0; transform: translateY(-4px); }
        100% { opacity: 0; }
      }
      .fade2 { animation: fade2 14s ease-in-out infinite; }
      @keyframes fade3 {
        0%   { opacity: 0; transform: translateY(6px); }
        30%  { opacity: 0; }
        34%  { opacity: 1; transform: translateY(0); }
        75%  { opacity: 1; }
        85%  { opacity: 0; transform: translateY(-4px); }
        100% { opacity: 0; }
      }
      .fade3 { animation: fade3 14s ease-in-out infinite; }
      @keyframes fade4 {
        0%   { opacity: 0; transform: translateY(6px); }
        46%  { opacity: 0; }
        50%  { opacity: 1; transform: translateY(0); }
        75%  { opacity: 1; }
        85%  { opacity: 0; transform: translateY(-4px); }
        100% { opacity: 0; }
      }
      .fade4 { animation: fade4 14s ease-in-out infinite; }
      .text-layer { filter: drop-shadow(0 0 4px rgba(88,166,255,0.3)); }
    </style>
