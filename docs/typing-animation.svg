  <defs>
    <style>
      @keyframes pulseA { 0%,100% { opacity: 0.063; } 35% { opacity: 0.566; } 70% { opacity: 0.081; } }
      .pulsea { animation: pulseA 2.42s ease-in-out infinite; }
      @keyframes pulseB { 0%,100% { opacity: 0.092; } 35% { opacity: 0.634; } 70% { opacity: 0.154; } }
      .pulseb { animation: pulseB 1.93s ease-in-out infinite; }
      @keyframes pulseC { 0%,100% { opacity: 0.081; } 35% { opacity: 0.552; } 70% { opacity: 0.051; } }
      .pulsec { animation: pulseC 3.36s ease-in-out infinite; }
      @keyframes pulseD { 0%,100% { opacity: 0.08; } 35% { opacity: 0.741; } 70% { opacity: 0.193; } }
      .pulsed { animation: pulseD 4.61s ease-in-out infinite; }
      @keyframes pulseE { 0%,100% { opacity: 0.08; } 35% { opacity: 0.618; } 70% { opacity: 0.14; } }
      .pulsee { animation: pulseE 3.03s ease-in-out infinite; }
      @keyframes pulseF { 0%,100% { opacity: 0.038; } 35% { opacity: 0.574; } 70% { opacity: 0.054; } }
