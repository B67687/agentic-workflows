    <circle cx="265" cy="62"  r="2.0" class="pc" style="animation-delay:-7.2s"/>
    <circle cx="325" cy="15"  r="2.0" class="pd" style="animation-delay:-4.2s"/>
    <circle cx="385" cy="55"  r="2.0" class="pe" style="animation-delay:-1.2s"/>
    <circle cx="445" cy="25"  r="2.0" class="pf" style="animation-delay:-6.2s"/>
    <circle cx="505" cy="48"  r="2.0" class="pg" style="animation-delay:-3.2s"/>
    <circle cx="565" cy="68"  r="2.0" class="ph" style="animation-delay:-0.7s"/>
    <circle cx="625" cy="35"  r="2.0" class="pa" style="animation-delay:-5.7s"/>
    <circle cx="685" cy="8"   r="2.0" class="pb" style="animation-delay:-2.7s"/>
    <circle cx="745" cy="52"  r="2.0" class="pc" style="animation-delay:-4.7s"/>
    <circle cx="805" cy="28"  r="2.0" class="pd" style="animation-delay:-1.7s"/>
    <circle cx="865" cy="60"  r="2.0" class="pe" style="animation-delay:-6.7s"/>
    <circle cx="135" cy="35"  r="2.0" class="pf" style="animation-delay:-3.7s"/>
    <circle cx="195" cy="70"  r="2.0" class="pg" style="animation-delay:-0.2s"/>
    <circle cx="255" cy="20"  r="2.0" class="ph" style="animation-delay:-5.2s"/>
    <circle cx="315" cy="55"  r="2.0" class="pa" style="animation-delay:-2.2s"/>
    <circle cx="375" cy="40"  r="2.0" class="pb" style="animation-delay:-4.8s"/>
    <circle cx="435" cy="10"  r="2.0" class="pc" style="animation-delay:-1.8s"/>
    <circle cx="495" cy="58"  r="2.0" class="pd" style="animation-delay:-6.8s"/>
    <circle cx="555" cy="30"  r="2.0" class="pe" style="animation-delay:-3.8s"/>
    <circle cx="615" cy="62"  r="2.0" class="pf" style="animation-delay:-0.9s"/>
    <circle cx="675" cy="18"  r="2.0" class="pg" style="animation-delay:-5.9s"/>
    <circle cx="735" cy="45"  r="2.0" class="ph" style="animation-delay:-2.9s"/>
    <circle cx="795" cy="68"  r="2.0" class="pa" style="animation-delay:-0.4s"/>
    <circle cx="855" cy="15"  r="2.0" class="pb" style="animation-delay:-6.4s"/>
    <circle cx="30"  cy="45"  r="2.0" class="pc" style="animation-delay:-3.4s"/>
    <circle cx="915" cy="50"  r="2.0" class="pd" style="animation-delay:-1.4s"/>
    <circle cx="425" cy="68"  r="2.0" class="pe" style="animation-delay:-4.4s"/>
    <circle cx="575" cy="10"  r="2.0" class="pf" style="animation-delay:-7.4s"/>
    <circle cx="95"  cy="25"  r="2.0" class="pg" style="animation-delay:-2.4s"/>
    <circle cx="845" cy="55"  r="2.0" class="ph" style="animation-delay:-0.6s"/>
  </g>
  <g class="text-layer">
    <g class="fade1"><text x="480" y="32" fill="#58a6ff" font-size="20" text-anchor="middle">Systems engineering for AI agents.</text></g>
    <g class="fade2"><text x="480" y="57" fill="#58a6ff" font-size="20" text-anchor="middle">Operating contract. Workflow discipline.</text></g>
    <g class="fade3"><text x="480" y="82" fill="#58a6ff" font-size="20" text-anchor="middle">Knowledge propagation. Shared context.</text></g>
    <g class="fade4"><text x="480" y="109" fill="#58a6ff" font-size="20" text-anchor="middle">One hub. One contract. N repos. Shared knowledge flows both ways.</text></g>
  </g>
