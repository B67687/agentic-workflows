<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 115" style="background:transparent; font-family:ui-monospace,'Cascadia Code','Fira Code',monospace;">
  <defs>
    <style>
      /* 8 patterns, each with 4 pulses/8s. Each pulse has unique colour+size.
         Each dot has INLINE animation-delay → independent timing.
         No two dots share class+delay → no unison sparkle. */
      @keyframes pa {
        0%,97%,100% { opacity: 0.01; fill: #58a6ff; }
        5%  { opacity: 0.85; transform: scale(2.0);  fill: #3fb950; }
        8%  { opacity: 0.03; }
        29% { opacity: 0.6;  transform: scale(1.2);  fill: #bc8cff; }
        32% { opacity: 0.02; }
        53% { opacity: 0.5;  transform: scale(0.8);  fill: #d29922; }
        56% { opacity: 0.02; }
        77% { opacity: 0.7;  transform: scale(1.6);  fill: #f778ba; }
        80% { opacity: 0.02; }
      }
      @keyframes pb {
        0%,97%,100% { opacity: 0.01; fill: #58a6ff; }
        5%  { opacity: 0.6;  transform: scale(1.2);  fill: #d29922; }
        8%  { opacity: 0.02; }
        29% { opacity: 0.85; transform: scale(2.0);  fill: #f778ba; }
        32% { opacity: 0.03; }
        53% { opacity: 0.5;  transform: scale(0.8);  fill: #3fb950; }
        56% { opacity: 0.02; }
        77% { opacity: 0.7;  transform: scale(1.6);  fill: #bc8cff; }
        80% { opacity: 0.02; }
      }
      @keyframes pc {
        0%,97%,100% { opacity: 0.01; fill: #58a6ff; }
        5%  { opacity: 0.7;  transform: scale(1.6);  fill: #bc8cff; }
        8%  { opacity: 0.03; }
        29% { opacity: 0.5;  transform: scale(0.8);  fill: #3fb950; }
        32% { opacity: 0.02; }
        53% { opacity: 0.85; transform: scale(2.0);  fill: #f778ba; }
        56% { opacity: 0.03; }
        77% { opacity: 0.6;  transform: scale(1.2);  fill: #d29922; }
        80% { opacity: 0.02; }
      }
      @keyframes pd {
        0%,97%,100% { opacity: 0.01; fill: #58a6ff; }
        5%  { opacity: 0.5;  transform: scale(0.8);  fill: #f778ba; }
        8%  { opacity: 0.02; }
        29% { opacity: 0.7;  transform: scale(1.6);  fill: #d29922; }
        32% { opacity: 0.03; }
        53% { opacity: 0.6;  transform: scale(1.2);  fill: #bc8cff; }
        56% { opacity: 0.02; }
        77% { opacity: 0.85; transform: scale(2.0);  fill: #3fb950; }
        80% { opacity: 0.02; }
      }
      @keyframes pe {
