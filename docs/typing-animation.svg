<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 115" style="background:transparent; font-family:ui-monospace,'Cascadia Code','Fira Code',monospace;">
  <defs>
    <style>
      /* Dot matrix pulse animations */
      @keyframes pulseA { 0%,100% { opacity: 0.06; } 50% { opacity: 0.6; } }
      @keyframes pulseB { 0%,100% { opacity: 0.12; } 30% { opacity: 0.7; } 70% { opacity: 0.04; } }
      @keyframes pulseC { 0%,100% { opacity: 0.04; } 40% { opacity: 0.5; } 80% { opacity: 0.1; } }
      @keyframes pulseD { 0%,100% { opacity: 0.1; } 25% { opacity: 0.08; } 60% { opacity: 0.65; } }
      @keyframes pulseE { 0%,100% { opacity: 0.07; } 35% { opacity: 0.55; } 65% { opacity: 0.03; } }
      @keyframes pulseF { 0%,100% { opacity: 0.15; } 45% { opacity: 0.05; } 75% { opacity: 0.6; } }
      .pa { animation: pulseA 3.7s ease-in-out infinite; }
      .pb { animation: pulseB 4.2s ease-in-out infinite; }
      .pc { animation: pulseC 2.9s ease-in-out infinite; }
      .pd { animation: pulseD 3.4s ease-in-out infinite; }
      .pe { animation: pulseE 5.1s ease-in-out infinite; }
      .pf { animation: pulseF 3.1s ease-in-out infinite; }

      /* Text animations (same as before) */
      @keyframes fade1 {
        0%   { opacity: 0; transform: translateY(6px); }
        8%   { opacity: 0; }
        12%  { opacity: 1; transform: translateY(0); }
        75%  { opacity: 1; }
        85%  { opacity: 0; transform: translateY(-4px); }
        100% { opacity: 0; }
      }
      @keyframes fade2 {
        0%   { opacity: 0; transform: translateY(6px); }
        22%  { opacity: 0; }
        26%  { opacity: 1; transform: translateY(0); }
        75%  { opacity: 1; }
        85%  { opacity: 0; transform: translateY(-4px); }
        100% { opacity: 0; }
      }
      @keyframes fade3 {
        0%   { opacity: 0; transform: translateY(6px); }
        38%  { opacity: 0; }
        42%  { opacity: 1; transform: translateY(0); }
        75%  { opacity: 1; }
        85%  { opacity: 0; transform: translateY(-4px); }
        100% { opacity: 0; }
      }
      @keyframes fade4 {
        0%   { opacity: 0; transform: translateY(6px); }
        54%  { opacity: 0; }
        58%  { opacity: 1; transform: translateY(0); }
        75%  { opacity: 1; }
        85%  { opacity: 0; transform: translateY(-4px); }
        100% { opacity: 0; }
      }
      .l1 { animation: fade1 14s ease-in-out infinite; }
      .l2 { animation: fade2 14s ease-in-out infinite; }
      .l3 { animation: fade3 14s ease-in-out infinite; }
      .l4 { animation: fade4 14s ease-in-out infinite; }
      .text-layer { filter: drop-shadow(0 0 4px rgba(88,166,255,0.3)); }
    </style>
  </defs>

  <!-- Dot matrix background -->
