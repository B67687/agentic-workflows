<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 115" style="background:transparent; font-family:ui-monospace,'Cascadia Code','Fira Code',monospace;">
  <defs>
    <style>
      @keyframes pa {
        0%,100% { opacity: 0.02; transform: scale(0.15); }
        28%     { opacity: 0.85; transform: scale(2.2); }
        50%     { opacity: 0.65; transform: scale(1.4); }
        75%     { opacity: 0.08; transform: scale(0.5); }
      }
      .pa { animation: pa 2.3s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes pb {
        0%,100% { opacity: 0.05; transform: scale(0.3); }
        30%     { opacity: 0.6; transform: scale(1.6); }
        55%     { opacity: 0.4; transform: scale(1.0); }
        78%     { opacity: 0.12; transform: scale(0.6); }
      }
      .pb { animation: pb 1.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes pc {
        0%,100% { opacity: 0.03; transform: scale(0.2); }
        32%     { opacity: 0.9; transform: scale(2.8); }
        52%     { opacity: 0.7; transform: scale(1.6); }
        72%     { opacity: 0.05; transform: scale(0.3); }
      }
      .pc { animation: pc 3.1s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes pd {
        0%,100% { opacity: 0.08; transform: scale(0.4); }
        35%     { opacity: 0.5; transform: scale(1.3); }
        60%     { opacity: 0.3; transform: scale(0.8); }
        80%     { opacity: 0.15; transform: scale(0.5); }
      }
      .pd { animation: pd 4.5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes pe {
        0%,100% { opacity: 0.01; transform: scale(0.1); }
        25%     { opacity: 0.7; transform: scale(2.5); }
        48%     { opacity: 0.5; transform: scale(1.2); }
        70%     { opacity: 0.1; transform: scale(0.4); }
      }
      .pe { animation: pe 2.9s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes pf {
        0%,100% { opacity: 0.06; transform: scale(0.25); }
        33%     { opacity: 0.75; transform: scale(1.9); }
        58%     { opacity: 0.55; transform: scale(1.1); }
        82%     { opacity: 0.03; transform: scale(0.35); }
      }
      .pf { animation: pf 5.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes pg {
        0%,100% { opacity: 0.04; transform: scale(0.18); }
        30%     { opacity: 0.8; transform: scale(3.0); }
        50%     { opacity: 0.6; transform: scale(1.8); }
        75%     { opacity: 0.07; transform: scale(0.45); }
      }
      .pg { animation: pg 3.6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes ph {
        0%,100% { opacity: 0.07; transform: scale(0.35); }
        35%     { opacity: 0.55; transform: scale(1.5); }
        55%     { opacity: 0.35; transform: scale(0.9); }
        78%     { opacity: 0.12; transform: scale(0.55); }
      }
      .ph { animation: ph 1.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes fade1 {
        0%   { opacity: 0; } 12%  { opacity: 0; } 16%  { opacity: 1; }
        75%  { opacity: 1; } 85%  { opacity: 0; } 100% { opacity: 0; }
      }
      .fade1 { animation: fade1 14s ease-in-out infinite; }
      @keyframes fade2 {
        0%   { opacity: 0; } 28%  { opacity: 0; } 32%  { opacity: 1; }
        75%  { opacity: 1; } 85%  { opacity: 0; } 100% { opacity: 0; }
      }
      .fade2 { animation: fade2 14s ease-in-out infinite; }
      @keyframes fade3 {
        0%   { opacity: 0; } 44%  { opacity: 0; } 48%  { opacity: 1; }
        75%  { opacity: 1; } 85%  { opacity: 0; } 100% { opacity: 0; }
      }
      .fade3 { animation: fade3 14s ease-in-out infinite; }
      @keyframes fade4 {
        0%   { opacity: 0; } 60%  { opacity: 0; } 64%  { opacity: 1; }
        75%  { opacity: 1; } 85%  { opacity: 0; } 100% { opacity: 0; }
      }
      .fade4 { animation: fade4 14s ease-in-out infinite; }
      .text-layer { filter: drop-shadow(0 0 4px rgba(88,166,255,0.3)); }
    </style>
