  <g class="text-layer">
    <g class="fade1"><text x="380" y="32" fill="#58a6ff" font-size="18" text-anchor="middle">Systems engineering for AI agents.</text></g>
    <g class="fade2"><text x="380" y="57" fill="#58a6ff" font-size="18" text-anchor="middle">Operating contract. Workflow discipline.</text></g>
    <g class="fade3"><text x="380" y="82" fill="#58a6ff" font-size="18" text-anchor="middle">Knowledge propagation. Shared context.</text></g>
    <g class="fade4"><text x="380" y="109" fill="#58a6ff" font-size="18" text-anchor="middle">One hub. One contract. N repos. Shared knowledge flows both ways.</text></g>
