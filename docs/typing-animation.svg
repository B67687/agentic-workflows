    <circle cx="345" cy="48"  r="2.0" class="pf" style="animation-delay:-7.0s"/>
    <circle cx="405" cy="32"  r="2.0" class="pg" style="animation-delay:-2.0s"/>
    <circle cx="465" cy="62"  r="2.0" class="ph" style="animation-delay:-5.0s"/>
    <circle cx="525" cy="15"  r="2.0" class="pa" style="animation-delay:-7.5s"/>
    <circle cx="585" cy="50"  r="2.0" class="pb" style="animation-delay:-1.5s"/>
    <circle cx="645" cy="22"  r="2.0" class="pc" style="animation-delay:-4.5s"/>
    <circle cx="705" cy="58"  r="2.0" class="pd" style="animation-delay:-2.5s"/>
    <circle cx="765" cy="12"  r="2.0" class="pe" style="animation-delay:-6.5s"/>
    <circle cx="825" cy="45"  r="2.0" class="pf" style="animation-delay:-0.8s"/>
