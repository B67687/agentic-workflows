<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 115" style="background:transparent; font-family:ui-monospace,'Cascadia Code','Fira Code',monospace;">
  <defs>
    <style>
      /* All blue dots. Same speed (8s). Different pulse counts = varied frequency.
         Each pulse random size (0.8-2.0x). Random delay = independent timing. */
      @keyframes pa { 0%,97%,100%{opacity:0;transform:scale(0.1)} 5%{opacity:0.85;transform:scale(2.0)} 8%{opacity:0} }
      @keyframes pb {
        0%,97%,100%{opacity:0;transform:scale(0.1)}
        5%{opacity:0.8;transform:scale(1.8)}8%{opacity:0}
        49%{opacity:0.7;transform:scale(1.3)}52%{opacity:0}
      }
      @keyframes pc {
        0%,97%,100%{opacity:0;transform:scale(0.1)}
        5%{opacity:0.85;transform:scale(2.0)}8%{opacity:0}
        35%{opacity:0.6;transform:scale(1.2)}38%{opacity:0}
        65%{opacity:0.7;transform:scale(1.5)}68%{opacity:0}
      }
      @keyframes pd {
        0%,97%,100%{opacity:0;transform:scale(0.1)}
        5%{opacity:0.8;transform:scale(1.7)}8%{opacity:0}
        27%{opacity:0.7;transform:scale(1.4)}30%{opacity:0}
        49%{opacity:0.85;transform:scale(2.0)}52%{opacity:0}
        71%{opacity:0.6;transform:scale(1.2)}74%{opacity:0}
      }
      @keyframes pe {
        0%,97%,100%{opacity:0;transform:scale(0.1)}
        5%{opacity:0.85;transform:scale(2.0)}8%{opacity:0}
        23%{opacity:0.6;transform:scale(1.1)}26%{opacity:0}
        41%{opacity:0.7;transform:scale(1.6)}44%{opacity:0}
        59%{opacity:0.5;transform:scale(0.9)}62%{opacity:0}
        77%{opacity:0.75;transform:scale(1.5)}80%{opacity:0}
      }
      @keyframes pf {
        0%,97%,100%{opacity:0;transform:scale(0.1)}
        5%{opacity:0.8;transform:scale(1.7)}8%{opacity:0}
        21%{opacity:0.6;transform:scale(1.2)}24%{opacity:0}
        37%{opacity:0.85;transform:scale(2.0)}40%{opacity:0}
        53%{opacity:0.5;transform:scale(0.8)}56%{opacity:0}
        69%{opacity:0.7;transform:scale(1.4)}72%{opacity:0}
        85%{opacity:0.6;transform:scale(1.1)}88%{opacity:0}
      }
      @keyframes pg {
        0%,97%,100%{opacity:0;transform:scale(0.1)}
        5%{opacity:0.85;transform:scale(2.0)}8%{opacity:0}
        18%{opacity:0.5;transform:scale(0.9)}21%{opacity:0}
        31%{opacity:0.7;transform:scale(1.5)}34%{opacity:0}
        44%{opacity:0.6;transform:scale(1.2)}47%{opacity:0}
        57%{opacity:0.8;transform:scale(1.7)}60%{opacity:0}
        70%{opacity:0.5;transform:scale(0.8)}73%{opacity:0}
        83%{opacity:0.7;transform:scale(1.4)}86%{opacity:0}
      }
      @keyframes ph {
        0%,97%,100%{opacity:0;transform:scale(0.1)}
        5%{opacity:0.8;transform:scale(1.6)}8%{opacity:0}
        16%{opacity:0.6;transform:scale(1.1)}19%{opacity:0}
        27%{opacity:0.7;transform:scale(1.4)}30%{opacity:0}
        38%{opacity:0.85;transform:scale(2.0)}41%{opacity:0}
        49%{opacity:0.5;transform:scale(0.9)}52%{opacity:0}
        60%{opacity:0.7;transform:scale(1.5)}63%{opacity:0}
        71%{opacity:0.6;transform:scale(1.2)}74%{opacity:0}
        82%{opacity:0.75;transform:scale(1.5)}85%{opacity:0}
      }
      .pa, .pb, .pc, .pd, .pe, .pf, .pg, .ph { fill: #58a6ff; transform-box: fill-box; transform-origin: center; animation-duration: 8s; animation-timing-function: ease-in-out; animation-iteration-count: infinite; }
      .pa { animation-name: pa; } .pb { animation-name: pb; } .pc { animation-name: pc; } .pd { animation-name: pd; }
      .pe { animation-name: pe; } .pf { animation-name: pf; } .pg { animation-name: pg; } .ph { animation-name: ph; }
      .fade1, .fade2, .fade3, .fade4 { fill: #58a6ff; }
      .fade1 { animation: fade1 14s ease-in-out infinite; }
      .fade2 { animation: fade2 14s ease-in-out infinite; }
      .fade3 { animation: fade3 14s ease-in-out infinite; }
      .fade4 { animation: fade4 14s ease-in-out infinite; }
      @keyframes fade1 { 0%{opacity:0}12%{opacity:0}16%{opacity:1}75%{opacity:1}85%{opacity:0}100%{opacity:0} }
      @keyframes fade2 { 0%{opacity:0}28%{opacity:0}32%{opacity:1}75%{opacity:1}85%{opacity:0}100%{opacity:0} }
      @keyframes fade3 { 0%{opacity:0}44%{opacity:0}48%{opacity:1}75%{opacity:1}85%{opacity:0}100%{opacity:0} }
      @keyframes fade4 { 0%{opacity:0}60%{opacity:0}64%{opacity:1}75%{opacity:1}85%{opacity:0}100%{opacity:0} }
      .text-layer { filter: drop-shadow(0 0 4px rgba(88,166,255,0.3)); }
    </style>
  </defs>
  <g>
    <circle cx="48"  cy="18"  r="2.0" class="pa" style="animation-delay:-1.0s"/>
    <circle cx="105" cy="42"  r="2.0" class="pb" style="animation-delay:-3.0s"/>
    <circle cx="165" cy="55"  r="2.0" class="pc" style="animation-delay:-6.0s"/>
