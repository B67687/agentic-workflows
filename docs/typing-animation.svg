        8%  { opacity: 0.02; }
        29% { opacity: 0.85; transform: scale(2.0);  fill: #58a6ff; }
        32% { opacity: 0.03; }
        53% { opacity: 0.7;  transform: scale(1.6);  fill: #d29922; }
        56% { opacity: 0.02; }
        77% { opacity: 0.5;  transform: scale(0.8);  fill: #bc8cff; }
        80% { opacity: 0.02; }
      }
      @keyframes ph {
