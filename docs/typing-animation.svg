<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 115" style="background:transparent; font-family:ui-monospace,'Cascadia Code','Fira Code',monospace;">
  <defs>
    <style>
      /* 8 classes, each with 4 pulses per 8s cycle. Each pulse has a different
         size AND a different colour. Random positions → no wave pattern. */
      /* pa: big-green, med-purple, sm-gold, lg-pink */
      @keyframes pa {
        0%,97%,100% { opacity: 0.01; transform: scale(0.15); fill: #58a6ff; }
        4%  { opacity: 0.5;  transform: scale(0.7);  fill: #3fb950; }
        6%  { opacity: 0.85; transform: scale(2.0);  fill: #3fb950; }
        9%  { opacity: 0.05; transform: scale(0.25); fill: #3fb950; }
        28% { opacity: 0.4;  transform: scale(0.5);  fill: #bc8cff; }
        30% { opacity: 0.7;  transform: scale(1.4);  fill: #bc8cff; }
        33% { opacity: 0.04; transform: scale(0.2);  fill: #bc8cff; }
        52% { opacity: 0.35; transform: scale(0.4);  fill: #d29922; }
        54% { opacity: 0.6;  transform: scale(1.0);  fill: #d29922; }
        57% { opacity: 0.03; transform: scale(0.2);  fill: #d29922; }
        76% { opacity: 0.5;  transform: scale(0.7);  fill: #f778ba; }
        78% { opacity: 0.8;  transform: scale(1.7);  fill: #f778ba; }
        81% { opacity: 0.04; transform: scale(0.25); fill: #f778ba; }
      }
