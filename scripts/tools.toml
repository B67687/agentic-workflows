# =============================================================================
# tools.toml --- Structured tool manifest for agentic-workflows
#
# Machine-readable registry of all agent-callable tools. Consumable by:
#   - MCP servers (register each tool programmatically)
#   - Agent runtimes (DeepSeek-TUI, OpenCode, Claude Code via MCP)
#   - scripts/tools.sh (generate human-readable + JSON output)
#   - Quality gates (determine which gates fire after which tools)
#
# Schema version: 1.0
# Last updated: 2026-05-15
# =============================================================================

# Metadata
[registry]
version = "1.2"
updated = "2026-05-15"
tool_count = 132
command_count = 14
binary_count = 6
description = "Agentic Workflows --- agent harness tool registry"

# =============================================================================
# TOOL CATEGORIES
# =============================================================================
# workflow    --- phase gates, planning, implementation orchestration
# quality     --- quality gates, verification, checks
# session     --- session state, checkpoint, resume, handoff
# git         --- git operations, worktree management
# agent       --- agent dispatch, sub-agents, pipeline, sandbox
# memory      --- learnings, memory stores, consolidation
# research    --- research methodology, analysis
# skill       --- skill management, progressive loading
# safety      --- error handling, escalation, guardrails
# experiment  --- benchmarks, experiments, optimization
# comms       --- agent-to-human, parley multi-agent
# productivity --- north-star, goal-decompose, product-shape
# utility     --- general utilities, tool registry, indexing
# constitution --- governance, policy
# =============================================================================

# =============================================================================
# WORKFLOW TOOLS
# =============================================================================

[[tool]]
name = "task-intake"
description = "Deterministic task intake with git-aware default routing"
category = "workflow"
path = "scripts/task-intake.sh"
type = "script"
phases = ["intake"]
quality_gates = []
inputs.verbose = { type = "boolean", description = "Verbose output", default = false }

[[tool]]
name = "phase-gate"
description = "Decide whether the next phase is allowed to proceed. Gate plugin discovery from scripts/gates/{phase}/*.sh"
category = "workflow"
path = "scripts/phase-gate.sh"
type = "script"
phases = ["research", "plan", "implement", "verify", "session"]
quality_gates = ["constitution", "comprehension", "preflight"]
inputs.phase = { type = "string", description = "Phase name", enum = ["research", "plan", "implement", "verify", "session"] }
inputs.check_quality = { type = "boolean", description = "Run quality gate plugin discovery", default = false }

[[tool]]
name = "plan-guard"
description = "Keep planning from expanding beyond the next executable slice. Includes --challenge flag for CATFISH protocol"
category = "workflow"
path = "scripts/plan-guard.sh"
type = "script"
phases = ["plan"]
quality_gates = []
inputs.challenge = { type = "boolean", description = "Run CATFISH adversarial challenge", default = false }
inputs.trivial = { type = "boolean", description = "Skip guard for trivial tasks", default = false }

[[tool]]
name = "plan-challenge"
description = "Dynamic dissent engine for CATFISH protocol. Submits plans to adversarial counterfactual review"
category = "workflow"
path = "scripts/plan-challenge.sh"
type = "script"
phases = ["plan"]
quality_gates = []

[[tool]]
