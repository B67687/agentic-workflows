# =============================================================================
# skills.toml — Structured skill index for agentic-workflows
#
# Machine-readable index of all 46 skills with frontmatter, activation
# criteria, and companion resources. Consumable by:
#   - MCP servers (expose skills as resources)
#   - Agent runtimes (DeepSeek-TUI, OpenCode, Claude Code via skill discovery)
#   - scripts/skill-toolset.sh (augment progressive loading with metadata)
#   - Quality gates (determine which quality gates a skill triggers)
#
# Schema version: 1.0
# Last updated: 2026-05-15
# =============================================================================

