# Self-Improving Framework — closed-loop improvement
#
# Core loop: measure → detect gaps → generate proposal → test → verify → decide
#
# Phases:
#   Phase 0 (this definition):      Loop design as workflow definition
#   Phase 1 (detect-gaps.sh):       Detection — bench monitoring, plateau detection
#   Phase 2 (validate-proposal.sh): Proposal format — structured improvement packet
#   Phase 3 (run-proposal.sh +      Test harness — run proposal, compare scores
#            compare-scores.sh):
#   Phase 4 (meta-report.sh):       Meta-loop — improve the improver
#
# Key risk: Self-improving can produce negative outcomes if the benchmark
# signal is bad. All keep/discard decisions require human confirmation.

id: self-improve
description: |
  Self-improving framework loop for harness effectiveness.
  Measure benchmark scores → detect gaps → generate improvement proposals
  using first-principles methodology → test against benchmarks →
  verify score change → keep/discard with human confirmation.

next: null

steps:
  # ── Step 1: Measure ─────────────────────────────────────────────────
  - id: measure_baseline
    kind: deterministic
    script: scripts/bench/aggregate.sh export
    description: |
      Capture current benchmark scores as the baseline for comparison.
      Uses the existing aggregate.sh export mode to get full score data.
      Result is saved to context.baseline for later comparison.

  # ── Step 2: Detect gaps ─────────────────────────────────────────────
  - id: detect_gaps
    kind: deliberative
    description: |
      Analyze benchmark scores against expectations. Run the detection
      script first to get automated gap analysis:

      ```
      bash scripts/bench/detect-gaps.sh
      ```

      The detector identifies four gap types:

      - **Coverage gaps** (severity: high): benchmarks with zero runs
      - **Signal gaps** (severity: medium): benchmarks with <3 runs
      - **Degradation** (severity: high/medium): scores dropped vs baseline
      - **Plateaus** (severity: medium): scores unchanged across cycles

      Review the detected gaps, validate with your own analysis, and
      select the highest-priority gap for the proposal step.

      Output: prioritized list of detected gaps with severity and evidence.

  # ── Step 3: Generate proposal ───────────────────────────────────────
  - id: generate_proposal
    kind: deliberative
    description: |
      Using first-principles methodology, generate an improvement proposal
      for the highest-priority gap. Apply FP decomposition:

      1. **Core entities**: What are the irreducible components of this gap?
      2. **Strip to fundamentals**: What MUST be true for the harness to work?
      3. **Reconstruct from axioms**: Simplest approach that satisfies fundamentals
      4. **Gap analysis**: Where does current state diverge from fundamentals?
      5. **Reframe**: What specific change closes this gap?

      Output: structured improvement proposal (must conform to
      benchmarks/proposal-schema.json). Validate with:

      ```
      bash scripts/bench/validate-proposal.sh < proposal.json
      ```

      Required fields: proposal_id, title, target_gap, hypothesis, change,
      predicted_impact (direction/magnitude/details), scope (files/phases),
      risk (low/medium/high), verification.

  # ── Step 4: Test ────────────────────────────────────────────────────
  - id: test_on_bench
    kind: deterministic
    script: scripts/bench/run-proposal.sh
    description: |
      Execute the improvement proposal against the benchmark suite.
      The script reads the proposal from the preceding step (stdin or file),
      validates it, creates a test branch, runs relevant benchmarks, and
      outputs post-change scores to .runtime/post-scores.json.

      Usage: bash scripts/bench/run-proposal.sh --proposal <proposal.json>

  # ── Step 5: Verify ──────────────────────────────────────────────────
  - id: verify_score_change
    kind: deterministic
    script: scripts/bench/compare-scores.sh
    description: |
      Compare post-proposal benchmark scores against the baseline.
      Computes delta per benchmark, per category, and overall score change.
      Classifies the change as IMPROVED, DEGRADED, or NEUTRAL.

      Reads .runtime/baseline-scores.json (from step 1) and
      .runtime/post-scores.json (from step 4).

      Usage: bash scripts/bench/compare-scores.sh

  # ── Step 6: Decide ──────────────────────────────────────────────────
  - id: decide
    kind: deliberative
    branches:
      keep: null          # mark improvement as verified, update baseline
      discard: null       # reject, log learnings
      iterate: detect_gaps  # loop back to gap detection for refinement
    description: |
      Review the score change (from step 5) and decide. Optionally review
      the meta-report for cycle health context:

      ```
      bash scripts/bench/meta-report.sh
      ```

      - **Score improved** → KEEP: incorporate the change, update the
        baseline for the next cycle. The improvement becomes part of
        the harness baseline.

      - **Score degraded** → DISCARD: revert the change. Analyze what
        went wrong and capture learnings for future proposals. The
        signal was negative — this prevents self-inflicted damage.

      - **Score unchanged** → ITERATE: refine the proposal and retest.
        The hypothesis was wrong but the direction may still be valid.
        Return to gap detection with the learning.

      Risk guard: Self-improving can produce negative outcomes if the
      signal is bad. All decisions require human confirmation.
      The agent presents the evidence and recommends, the user decides.
