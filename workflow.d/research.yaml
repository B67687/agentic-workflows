# Research workflow — objective codebase investigation
# 1. Formulate objective questions (deliberative)
# 2. Fan out parallel research agents for each question (parallel)
# 3. Review findings with user (deliberative)

id: research
description: Investigate the codebase objectively
next: workflow/design.yaml

steps:
  - id: formulate_questions
    kind: deliberative
    description: |
      Propose 3-5 objective questions about the codebase.
      Questions must be factual — no opinions, no solution assumptions.
      Example: "How does module X handle auth?" not "Should we rewrite auth?"
      Back and forth with user until consensus on the question set.
      The agreed questions are saved to context.questions — they feed the parallel research step.

  - id: parallel_research
    kind: parallel
    description: |
      Fan out one research agent per question, all running concurrently.
      Each agent explores its question independently using search, grep, glob, read.
      Results are merged into a unified findings document.
    sub_steps:
      - id: explore_q1
        script: scripts/research/explore.sh
        description: Research question 1
      - id: explore_q2
        script: scripts/research/explore.sh
        description: Research question 2
      - id: explore_q3
        script: scripts/research/explore.sh
        description: Research question 3
    merge_with: scripts/research/merge-findings.sh

  - id: review_findings
    kind: deliberative
    description: |
      Present the merged parallel findings. No opinions, no proposed solutions.
      Ask: "Is anything missing? Should we investigate further?"
      If more needed, user can choose to loop back or advance.
